<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心动小镇 · 官方集卡</title>
    <meta name="description" content="心动小镇官方风格任务抽卡系统">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="main-bg-canvas"></canvas>
    <div class="noise-layer"></div>

    <div class="deco-element deco-a">✦</div>
    <div class="deco-element deco-b">✧</div>
    <div class="deco-element deco-c">✶</div>
    <div class="deco-element deco-d">✦</div>

    <main id="main-screen">
        <div id="title-container">
            <p class="eyebrow">Heartopia Tasks</p>
            <h1 class="grand-title">心动小镇</h1>
            <div class="subtitle">
                <span class="star-icon">✦</span>
                <span class="subtitle-text">Heartopia Tasks</span>
                <span class="star-icon">✦</span>
            </div>
        </div>

        <button id="summon-btn" class="summon-btn" type="button">
            <span class="btn-core"></span>
            <span class="btn-text">给我一个任务好了</span>
        </button>
    </main>

    <div id="summon-overlay" data-rarity="normal">
        <div class="summon-backdrop"></div>
        <div class="summon-grid"></div>
        <div class="summon-column summon-column-left"></div>
        <div class="summon-column summon-column-right"></div>
        <div class="summon-shutter summon-shutter-top"></div>
        <div class="summon-shutter summon-shutter-bottom"></div>
        <div class="summon-rift-shell" aria-hidden="true">
            <div class="summon-rift-core"></div>
            <div class="summon-rift-edge summon-rift-edge-left"></div>
            <div class="summon-rift-edge summon-rift-edge-right"></div>
        </div>
        <div class="summon-card-shell" aria-hidden="true">
            <div class="card-shell-frame"></div>
            <div class="card-shell-line"></div>
            <div class="card-shell-line line-two"></div>
        </div>
        <canvas id="summon-fx-canvas"></canvas>
        <div id="white-flash"></div>
    </div>

    <div id="card-reveal-overlay" data-rarity="normal">
        <div class="reveal-backdrop"></div>
        <div class="reveal-horizon"></div>
        <div class="reveal-runway"></div>
        <div class="reveal-rings" aria-hidden="true">
            <span class="reveal-ring reveal-ring-a"></span>
            <span class="reveal-ring reveal-ring-b"></span>
            <span class="reveal-ring reveal-ring-c"></span>
        </div>
        <canvas id="confetti-canvas"></canvas>

        <div id="card-stage">
            <div id="the-card" class="premium-card">
                <div class="card-inner-wrap">
                    <div class="card-face face-back"></div>
                    <div class="card-face face-front">
                        <div id="card-bg-image" class="card-bg-image"></div>
                        <div class="task-content-wrap">
                            <div class="rarity-badge" id="rarity-text">普通</div>
                            <h2 class="task-desc" id="task-desc">正在读取任务...</h2>
                            <div class="stars-container" id="stars-row">★ ★ ★</div>
                        </div>
                        <div id="card-glare" class="card-glare"></div>
                    </div>
                </div>
            </div>
        </div>

        <button id="retry-btn" class="retry-btn" type="button">再来一次</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
